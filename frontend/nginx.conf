server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (same-origin → no CORS needed).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;        # transcription can take a while
        client_max_body_size 30m;       # allow audio uploads (backend caps at 25 MB)
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
